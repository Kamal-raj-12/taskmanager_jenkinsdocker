apiVersion: v1
kind: Secret
metadata:
  name: task-manager-server-secret
  namespace: task-manager
type: Opaque
stringData:
  JWT_SECRET: change-me-in-production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: task-manager-server-config
  namespace: task-manager
data:
  MONGO_URI: mongodb://task-manager-mongo:27017/taskmanager
  CORS_ORIGIN: "*"
  PORT: "4000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-server
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-server
  template:
    metadata:
      labels:
        app: task-manager-server
    spec:
      containers:
        - name: task-manager-server
          image: kamalraj12345/task-manager-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: task-manager-server-config
                  key: MONGO_URI
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: task-manager-server-config
                  key: CORS_ORIGIN
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: task-manager-server-config
                  key: PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: task-manager-server-secret
                  key: JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-server
  namespace: task-manager
spec:
  selector:
    app: task-manager-server
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
