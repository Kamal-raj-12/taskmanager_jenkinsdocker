apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-client
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-client
  template:
    metadata:
      labels:
        app: task-manager-client
    spec:
      containers:
        - name: task-manager-client
          image: kamalraj12345/task-manager-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-client
  namespace: task-manager
spec:
  selector:
    app: task-manager-client
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
