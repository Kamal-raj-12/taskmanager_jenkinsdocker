apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: task-manager-mongo-pvc
  namespace: task-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-mongo
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-mongo
  template:
    metadata:
      labels:
        app: task-manager-mongo
    spec:
      containers:
        - name: task-manager-mongo
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: taskmanager
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: task-manager-mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-mongo
  namespace: task-manager
spec:
  selector:
    app: task-manager-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  type: ClusterIP
